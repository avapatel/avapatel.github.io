<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Makes the website work on phones and laptops -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ava Patel | Portfolio</title>

    <!-- Connects this page to the CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Top navbar -->
    <header class="navBar">
        <div class="navLeft">
            <img src="images/logo.png" alt="Ava Patel logo" class="navLogo">

            <div class="navText">
                <div class="navName">Ava Patel</div>
                <div class="navSchool">Molinaroli College of Engineering and Computing</div>
            </div>
        </div>

        <button class="menuButton" id="menuButton">Menu</button>

        <nav class="navLinks" id="navLinks">
            <a href="#about">About</a>
            <a href="#projects">Projects</a>
            <a href="#skills">Skills</a>
            <a href="#resume">Resume/Coursework</a>
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <!-- These sections get loaded from the separate files -->
    <main>
        <div id="homeSpot"></div>
        <div id="aboutSpot"></div>
        <div id="projectsSpot"></div>
        <div id="skillsSpot"></div>
        <div id="resumeSpot"></div>
        <div id="contactSpot"></div>
    </main>

    <footer>
        <p>© <span id="year"></span> Ava Patel. Built with HTML, CSS, and JavaScript.</p>
    </footer>

    <!-- Connects this page to the JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
